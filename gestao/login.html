<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AASEC — Entrar</title>
<link rel="stylesheet" href="estilos.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#1B5FA8 0%,#0d3b6e 50%,#0d3b6e 100%);padding:20px}
.card{background:#fff;border-radius:20px;padding:44px 36px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.card-logo{text-align:center;margin-bottom:28px}
.card-logo img{height:80px;mix-blend-mode:multiply;margin-bottom:10px}
.card-logo h1{font-size:18px;font-weight:800;color:var(--preto)}
.card-logo p{font-size:11px;color:var(--cinza)}
.divider{width:36px;height:3px;background:var(--amarelo);border-radius:2px;margin:18px auto}
.card h2{font-size:20px;font-weight:800;color:var(--preto);margin-bottom:4px}
.card .sub{font-size:13px;color:var(--cinza);margin-bottom:24px;line-height:1.5}
.btn-login{width:100%;padding:13px;background:var(--verde);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:all .25s;margin-top:6px;margin-bottom:14px}
.btn-login:hover{background:#0d3b6e;transform:translateY(-2px);box-shadow:0 6px 20px rgba(74,124,31,.3)}
.erro{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;font-size:12px;padding:10px 14px;border-radius:8px;margin-bottom:12px;display:none}
.frase{background:linear-gradient(135deg,#fffdf0,#fff8dc);border-radius:10px;padding:14px;margin-top:20px;text-align:center;border-left:3px solid var(--amarelo)}
.frase p{font-size:12px;color:var(--marrom);line-height:1.6;font-style:italic}
</style>
</head>
<body>
<div class="card">
  <div class="card-logo">
    <img src="../assets/logo_aasec.png" alt="AASEC" style="object-fit:contain">
    <h1>Área de Gestão</h1>
    <p>AASEC · Carambeí/PR</p>
  </div>
  <div class="divider"></div>
  <h2>Bem-vinda 🌻</h2>
  <p class="sub">Entre com seu acesso para registrar dados e acompanhar os indicadores.</p>

  <div class="erro" id="erro">E-mail ou senha incorretos.</div>

  <form onsubmit="entrar(event)">
    <div class="fg">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com.br" required autocomplete="email">
    </div>
    <div class="fg">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login">Entrar</button>
    <div style="text-align:center"><a href="#" style="font-size:13px;color:var(--verde);text-decoration:none">Esqueci minha senha</a></div>
  </form>

  <div class="frase">
    <p>"Transformar vidas para Cristo — através do cuidado, da educação e do amor."</p>
  </div>
</div>

<script src="dados.js"></script>
<script src="cadastros.js"></script>
<script>
function entrar(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  const usuario = autenticarUsuario(email, senha);

  if (!usuario) {
    document.getElementById('erro').style.display = 'block';
    return;
  }

  sessionStorage.setItem('aasec_sessao', JSON.stringify(usuario));
  window.location.href = 'indicadores.html';
}

// Se já está logado, redirecionar
if (sessionStorage.getItem('aasec_sessao')) {
  window.location.href = 'indicadores.html';
}
</script>
</body>
</html>
