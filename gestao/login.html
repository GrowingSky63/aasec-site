<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AASEC — Entrar</title>
<link rel="stylesheet" href="estilos.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#1B5FA8 0%,#0d3b6e 50%,#0d3b6e 100%);padding:20px}
.card{background:#fff;border-radius:20px;padding:44px 36px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.card-logo{text-align:center;margin-bottom:28px}
.card-logo img{height:80px;mix-blend-mode:multiply;margin-bottom:10px}
.card-logo h1{font-size:18px;font-weight:800;color:var(--preto)}
.card-logo p{font-size:11px;color:var(--cinza)}
.divider{width:36px;height:3px;background:var(--amarelo);border-radius:2px;margin:18px auto}
.card h2{font-size:20px;font-weight:800;color:var(--preto);margin-bottom:4px}
.card .sub{font-size:13px;color:var(--cinza);margin-bottom:24px;line-height:1.5}
.btn-ms{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 20px;background:#fff;color:#5e5e5e;border:1px solid #8c8c8c;border-radius:10px;font-size:15px;font-weight:600;font-family:'Segoe UI','Inter',sans-serif;cursor:pointer;transition:all .25s;margin-top:6px}
.btn-ms:hover{background:#f5f5f5;border-color:#0078d4;color:#0078d4;transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,120,212,.2)}
.btn-ms svg{flex-shrink:0}
.erro{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;font-size:12px;padding:10px 14px;border-radius:8px;margin-bottom:12px;display:none}
.frase{background:linear-gradient(135deg,#fffdf0,#fff8dc);border-radius:10px;padding:14px;margin-top:20px;text-align:center;border-left:3px solid var(--amarelo)}
.frase p{font-size:12px;color:var(--marrom);line-height:1.6;font-style:italic}
</style>
</head>
<body>
<div class="card">
  <div class="card-logo">
    <img src="../assets/logo_aasec.png" alt="AASEC" style="object-fit:contain">
    <h1>Área de Gestão</h1>
    <p>AASEC · Carambeí/PR</p>
  </div>
  <div class="divider"></div>
  <h2>Bem-vinda 🌻</h2>
  <p class="sub">Entre com sua conta Microsoft para acessar o sistema de gestão.</p>

  <div class="erro" id="erro">Não foi possível fazer login. Tente novamente.</div>

  <button class="btn-ms" onclick="window.location.href='/auth/login'">
    <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 21 21">
      <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
      <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
      <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
      <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
    </svg>
    Entrar com Microsoft
  </button>

  <div class="frase">
    <p>"Transformar vidas para Cristo — através do cuidado, da educação e do amor."</p>
  </div>
</div>

<script>
if (new URLSearchParams(location.search).has('erro')) {
  document.getElementById('erro').style.display = 'block';
}
// Se já está logado, redirecionar
fetch('/auth/me').then(r => r.json()).then(d => {
  if (d.logado) window.location.href = 'convenios.html';
});
</script>
</body>
</html>
