<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arquivos — AASEC</title>
<link rel="stylesheet" href="estilos.css">
<style>
.filtros-wrap{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.filtro-grupo label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--cinza);display:block;margin-bottom:6px}
.ftabs{display:flex;gap:6px;flex-wrap:wrap}
.ftab{padding:6px 16px;border-radius:20px;border:1.5px solid var(--cinza-borda);background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--grafite);font-family:'Inter',sans-serif;transition:all .2s}
.ftab:hover,.ftab.on{background:var(--azul);color:#fff;border-color:var(--azul)}
.doc-list{display:flex;flex-direction:column;gap:6px}
.doc-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.05);transition:all .2s}
.doc-row.tem{cursor:pointer}
.doc-row.tem:hover{background:var(--azul-claro);transform:translateX(3px)}
.dr-ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:var(--azul-claro)}
.doc-row.tem .dr-ico{background:#d1fae5}
.dr-info{flex:1;min-width:0}
.dr-info strong{display:block;font-size:13px;font-weight:700;color:var(--preto);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dr-info span{font-size:11px;color:var(--cinza)}
.dr-tipo{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.tp-institucional,.tp-relatorio{background:#dbeafe;color:#1e40af}
.tp-contrato{background:#fef9c3;color:#854d0e}
.dr-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.st-ok{background:#d1fae5;color:#065f46}
.st-nd{background:#f1f5f9;color:#94a3b8}
.ano-sep{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--cinza);padding:10px 0 4px;border-bottom:1px solid var(--cinza-borda);margin-bottom:6px;margin-top:18px}
.vazio{text-align:center;padding:48px;color:var(--cinza)}
.vazio .vi{font-size:44px;margin-bottom:10px}
.btn-apagar{background:#fee2e2;color:#dc2626;border:none;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:13px;flex-shrink:0}
.btn-apagar:hover{background:#fca5a5}
</style>
</head>
<body>
<button class="mob-toggle" id="mobToggle">☰</button>
<div class="sidebar">
  <div class="sb-logo">
    <a href="../index.html" style="display:contents">
      <img src="../assets/logo_aasec.png" alt="AASEC" style="object-fit:contain">
    </a>
    <strong>Gestão</strong>
    <span>CEI Betel · Esco-Lar</span>
  </div>
  <div class="sb-unidade"><span id="sb-unidade"></span></div>
  <nav>
    <a class="nav-item" href="convenios.html" data-page="convenios" title="Gerenciar convênios e prestações de contas"><span class="nav-icon">📑</span> Convênios</a>
    <a class="nav-item" href="documentos.html" data-page="documentos" title="Documentos institucionais"><span class="nav-icon">📁</span> Arquivos</a>
  </nav>
  <div class="sb-bottom">
    <a href="../index.html">← Voltar ao site</a>
    <a href="#" onclick="sair()" style="margin-top:6px">⏻ Sair</a>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-esq">
      <h2>📁 Arquivos</h2>
      <p>Documentos institucionais · AASEC</p>
    </div>
    <button class="btn btn-cor" onclick="abrirAdicionar()">+ Adicionar documento</button>
  </div>

  <!-- MODAL ADICIONAR/EDITAR -->
  <div class="modal-overlay" id="modalAdd">
    <div class="modal">
      <div class="modal-h">
        <h3 id="modalAddTitulo">Adicionar Documento</h3>
        <button class="modal-close" onclick="fecharModal('modalAdd')">✕</button>
      </div>
      <div class="modal-body">
        <div class="fg">
          <label>Nome <span class="req">*</span></label>
          <input type="text" id="aNome" placeholder="Ex: Regimento Interno CEI Betel">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="fg">
            <label>Tipo <span class="req">*</span></label>
            <select id="aTipo">
              <option value="">Selecione</option>
              <option value="institucional">Institucional</option>
              <option value="contrato">Contrato/Convênio</option>
              <option value="relatorio">Relatório</option>
            </select>
          </div>
          <div class="fg">
            <label>Unidade <span class="req">*</span></label>
            <select id="aUnidade">
              <option value="">Selecione</option>
              <option value="AASEC">AASEC</option>
              <option value="CEI Betel">CEI Betel</option>
              <option value="Esco-Lar">Esco-Lar</option>
            </select>
          </div>
        </div>
        <div class="fg">
          <label>Ano</label>
          <input type="text" id="aAno" placeholder="Ex: 2026" maxlength="4">
        </div>
        <div id="avisoEdicao" style="display:none;margin-bottom:12px;padding:10px 14px;background:#fef9c3;border-radius:8px;border-left:3px solid #ca8a04;font-size:12px;color:#854d0e">
          Para trocar o arquivo, apague este registro e cadastre novamente.
        </div>
        <div class="fg" id="fgArquivo">
          <label>Arquivo</label>
          <div id="dropZone"
            style="border:2px dashed var(--cinza-borda);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;background:#fafbfc"
            onclick="document.getElementById('fileInput').click()"
            ondragover="event.preventDefault();this.style.borderColor='var(--azul)';this.style.background='#dbeafe'"
            ondragleave="this.style.borderColor='var(--cinza-borda)';this.style.background='#fafbfc'"
            ondrop="handleDrop(event)">
            <div id="dropText" style="font-size:13px;color:var(--cinza)">Clique para procurar ou arraste o arquivo aqui</div>
          </div>
          <input type="file" id="fileInput" style="display:none" onchange="handleFile(this.files[0])">
        </div>
        <div class="fg">
          <label>Observação</label>
          <input type="text" id="aObs" placeholder="Opcional">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="fecharModal('modalAdd')">Cancelar</button>
        <button class="btn btn-cor" onclick="salvarDoc()">Salvar</button>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="filtros-wrap">
      <div class="filtro-grupo">
        <label>Tipo</label>
        <div class="ftabs" id="ftTipo">
          <button class="ftab on" onclick="setF('tipo','',this)">Todos</button>
          <button class="ftab" onclick="setF('tipo','institucional',this)">Institucional</button>
          <button class="ftab" onclick="setF('tipo','contrato',this)">Contratos</button>
          <button class="ftab" onclick="setF('tipo','relatorio',this)">Relatórios</button>
        </div>
      </div>
      <div class="filtro-grupo">
        <label>Unidade</label>
        <div class="ftabs" id="ftUnidade">
          <button class="ftab on" onclick="setF('unidade','',this)">Todas</button>
          <button class="ftab" onclick="setF('unidade','AASEC',this)">AASEC</button>
          <button class="ftab" onclick="setF('unidade','CEI Betel',this)">CEI Betel</button>
          <button class="ftab" onclick="setF('unidade','Esco-Lar',this)">Esco-Lar</button>
        </div>
      </div>
    </div>
    <div id="lista"></div>
  </div>
</div>

<script src="../dados_docs.js"></script>
<script src="_nav.js"></script>
<script>
var TIPO_LABEL = {institucional:'Institucional', contrato:'Contrato/Convênio', relatorio:'Relatório'};
var TIPO_CLASS = {institucional:'tp-institucional', contrato:'tp-contrato', relatorio:'tp-relatorio'};

var filtros = {tipo:'', unidade:''};
var _arquivo = null;
var _editandoId = null;
var _extras = [];

document.addEventListener('DOMContentLoaded', async function() {
  initNav('documentos');
  initModal('modalAdd');
  await carregarExtras();
  renderLista();
});

async function carregarExtras() {
  try {
    var resp = await fetch('/api/extras');
    _extras = await resp.json();
  } catch(e) {
    _extras = [];
  }
}

async function salvarExtras() {
  try {
    await fetch('/api/extras', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(_extras) });
  } catch(e) {
    alert('Erro ao salvar: ' + e.message);
  }
}

function getDocs() {
  var base = (typeof AASEC_DOCS !== 'undefined' ? AASEC_DOCS : [])
    .filter(function(d) { return d.tipo !== 'prestacao'; });
  var extrasInst = _extras.filter(function(d) { return !d.convenio_id && d.tipo !== 'prestacao'; });
  var baseIds = base.map(function(d) { return d.id || d.link; });
  var novos = extrasInst.filter(function(d) { return baseIds.indexOf(d.id) === -1 && baseIds.indexOf(d.link) === -1; });
  return base.concat(novos);
}

function resolverLink(link) {
  if (!link) return null;
  link = link.replace(/^['"]|['"]$/g, '').trim();
  if (link.indexOf('://') !== -1) return link;
  return window.location.origin + (link.charAt(0) === '/' ? link : '/' + link);
}

// ── Filtros ──────────────────────────────────────────────

function setF(campo, val, btn) {
  filtros[campo] = val;
  document.querySelectorAll('#ft' + campo.charAt(0).toUpperCase() + campo.slice(1) + ' .ftab')
    .forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
  renderLista();
}

// ── Render ───────────────────────────────────────────────

function renderLista() {
  var lista = getDocs().filter(function(d) {
    if (filtros.tipo && d.tipo !== filtros.tipo) return false;
    if (filtros.unidade && d.unidade !== filtros.unidade) return false;
    return true;
  }).sort(function(a, b) {
    return (b.ano||'').localeCompare(a.ano||'');
  });

  var el = document.getElementById('lista');

  if (!lista.length) {
    el.innerHTML = '<div class="vazio"><div class="vi">📁</div><h4>Nenhum documento encontrado</h4></div>';
    return;
  }

  var porAno = {};
  lista.forEach(function(d) {
    var a = d.ano || '—';
    if (!porAno[a]) porAno[a] = [];
    porAno[a].push(d);
  });

  var html = '';
  Object.keys(porAno).sort().reverse().forEach(function(ano) {
    var itens = porAno[ano];
    html += '<div class="ano-sep">' + ano + ' — ' + itens.length + ' documento(s)</div>';
    html += '<div class="doc-list">';
    itens.forEach(function(d) {
      var tem = !!d.link;
      var url = resolverLink(d.link);
      var tipoC = TIPO_CLASS[d.tipo] || 'tp-institucional';
      var tipoL = TIPO_LABEL[d.tipo] || d.tipo;

      html += '<div class="doc-row' + (tem ? ' tem' : '') + '"'
           + (tem ? ' onclick="window.open(\'' + url.replace(/'/g,"\\'") + '\',\'_blank\')"' : '') + '>';
      html += '<div class="dr-ico">' + (tem ? '✅' : '📋') + '</div>';
      html += '<div class="dr-info"><strong>' + d.nome + '</strong>'
           + '<span>' + d.unidade + (d.ano ? ' · ' + d.ano : '') + '</span></div>';
      html += '<span class="dr-tipo ' + tipoC + '">' + tipoL + '</span>';
      if (tem) {
        html += '<a class="dr-status st-ok" href="' + url + '" target="_blank" onclick="event.stopPropagation()">Abrir</a>';
      }
      if (d.id) {
        html += '<button class="btn-apagar" onclick="event.stopPropagation();apagarDoc(\'' + d.id + '\')" title="Apagar">🗑️</button>';
      }
      html += '</div>';
    });
    html += '</div>';
  });

  el.innerHTML = html;
}

// ── Modal ────────────────────────────────────────────────

function abrirAdicionar() {
  _editandoId = null;
  _arquivo = null;
  document.getElementById('modalAddTitulo').textContent = 'Adicionar Documento';
  document.getElementById('aNome').value = '';
  document.getElementById('aTipo').value = '';
  document.getElementById('aUnidade').value = '';
  document.getElementById('aAno').value = '';
  document.getElementById('aObs').value = '';
  document.getElementById('fileInput').value = '';
  document.getElementById('dropText').textContent = 'Clique para procurar ou arraste o arquivo aqui';
  document.getElementById('dropZone').style.borderColor = 'var(--cinza-borda)';
  document.getElementById('dropZone').style.background = '#fafbfc';
  document.getElementById('fgArquivo').style.display = '';
  document.getElementById('avisoEdicao').style.display = 'none';
  abrirModal('modalAdd');
}

function handleFile(file) {
  if (!file) return;
  _arquivo = file;
  document.getElementById('dropText').innerHTML =
    '✅ <strong>' + file.name + '</strong> (' + (file.size/1024).toFixed(0) + ' KB)';
  document.getElementById('dropZone').style.borderColor = '#10b981';
  document.getElementById('dropZone').style.background = '#ecfdf5';
  if (!document.getElementById('aNome').value) {
    document.getElementById('aNome').value = file.name.replace(/\.[^.]+$/, '').replace(/_/g, ' ');
  }
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').style.borderColor = 'var(--cinza-borda)';
  document.getElementById('dropZone').style.background = '#fafbfc';
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
}

async function salvarDoc() {
  var nome = document.getElementById('aNome').value.trim();
  var tipo = document.getElementById('aTipo').value;
  var unidade = document.getElementById('aUnidade').value;
  if (!nome || !tipo || !unidade) { alert('Preencha nome, tipo e unidade.'); return; }

  var ano = document.getElementById('aAno').value.trim() || null;
  var obs = document.getElementById('aObs').value.trim();
  var link = null;

  if (_arquivo) {
    var fd = new FormData();
    fd.append('file', _arquivo);
    fd.append('tipo', tipo);
    fd.append('unidade', unidade);
    fd.append('ano', ano || '');

    try {
      var resp = await fetch('/upload', { method: 'POST', body: fd });
      var r = await resp.json();
      if (!r.ok) { alert('Erro no upload: ' + r.erro); return; }
      link = r.link;
    } catch(e) {
      alert('Erro: ' + e.message);
      return;
    }
  }

  if (_editandoId) {
    var idx = _extras.findIndex(function(d) { return d.id === _editandoId; });
    if (idx !== -1) {
      _extras[idx].nome = nome;
      _extras[idx].tipo = tipo;
      _extras[idx].unidade = unidade;
      _extras[idx].ano = ano;
      _extras[idx].obs = obs;
      if (link) _extras[idx].link = link;
    }
  } else {
    _extras.push({
      id: Date.now().toString(),
      nome: nome,
      tipo: tipo,
      unidade: unidade,
      ano: ano,
      link: link,
      obs: obs,
      criado_em: new Date().toISOString()
    });
  }

  await salvarExtras();
  _arquivo = null;
  _editandoId = null;
  fecharModal('modalAdd');
  renderLista();
}

async function apagarDoc(id) {
  if (!confirm('Apagar este documento?')) return;
  var doc = _extras.find(function(d) { return d.id === id; });

  if (doc && doc.link) {
    try {
      await fetch('/apagar', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({link: doc.link})
      });
    } catch(e) {}
  }

  _extras = _extras.filter(function(d) { return d.id !== id; });
  await salvarExtras();
  renderLista();
}
</script>
</body>
</html>
